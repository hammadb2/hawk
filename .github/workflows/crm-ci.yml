name: CRM CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-test-key-for-ci-build-only

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - run: cd backend && python -c "from main import app; print('ok', app.title)"

  scanner_compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      # Backend requirements let the endpoint smoke test import the full
      # FastAPI app. pytest/async extras cover scanner_compliance + NVD CVE
      # matching + homepage preset scan ranking + endpoint tests.
      - run: pip install -r backend/requirements.txt pytest pytest-asyncio
      - run: |
          cd hawk-scanner-v2 && python -m pytest \
            tests/test_hipaa_no_fabrication.py \
            tests/test_nvd_cves.py \
            tests/test_pick_worst_dental.py \
            tests/test_homepage_preset_scan_endpoint.py \
            tests/test_portal_first_login.py \
            tests/test_portal_incident_report.py \
            tests/test_aria_generic_email_filter.py \
            tests/test_portal_certified_seven_step.py \
            -v
